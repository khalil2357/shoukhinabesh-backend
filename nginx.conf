events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  server {
    listen 80;
    server_name shoukhinabesh.com www.shoukhinabesh.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name shoukhinabesh.com www.shoukhinabesh.com;

    ssl_certificate     /etc/letsencrypt/live/shoukhinabesh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shoukhinabesh.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── API reverse proxy ──────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      # Required for Stripe webhook raw body
      proxy_request_buffering off;
    }

    # ── React SPA ──────────────────────────────────────────────────────────
    location / {
      root  /var/www/dist;
      index index.html;
      try_files $uri $uri/ /index.html;

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
