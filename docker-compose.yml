version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: shoukhinabesh-api
    env_file: .env
    ports:
      - '3000:3000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: shoukhinabesh-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/dist:/var/www/dist:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
